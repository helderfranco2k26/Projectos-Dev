<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login|ENTEC</title>
    <link rel="stylesheet" href="Login-style.css">
    <link rel="shortcut icon" href="../icon/entec.ico" type="image/x-icon">
</head>
<body>
    <nav class="barra-superior">
        <h1><a href="../Pagina Inicial da ENTEC/Home.html">ENTEC</a></h1>
        <a href="#">Help</a>
    </nav>
    <div class="container">
        <header>
            <h1>Iniciar Sessão</h1>
            <p>Inicie sessão da sua conta</p>
        </header>
        <main>
            <form>
                <div class="input-text">
                    <input type="text" id="email" placeholder="Endereço de e-mail">
                    <label for="email">
                        email
                    </label>
                </div>
                <div class="input-text">
                    <input type="password" id="password" placeholder="Password">
                    <label for="password">
                        Senha
                    </label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="lembra-me" checked>
                    <label for="lembra-me">Lembrar senha</label>
                </div>
                <button>Continuar</button>
            </form>
        </main>
        <footer>
            <div class="criar">
                <span>
                    <p>Não tem uma conta?<a href="../pagina de Registro-ENTEC/Register.html">Registar-se</a></p>
                </span>
            </div>
            <div class="alternativa">
                <span>OU</span>
            </div>
            <div class="redes-sociais">
                <a href="#"><strong>Entrar com o Google</strong></a>
                <a href="#"><strong>Entrar com o Facebook</strong></a>
                <a href="#"><strong>Entrar com o Linkedin</strong></a>
            </div>
        </footer>
    </div>
</body>
</html>
