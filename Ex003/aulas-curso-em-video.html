<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas Guanabara</title>
    <style>
        /* BORDAS DECORADAS*/
        h1{
            border: 20px solid blue;
            padding: 8px;
            border-image-source: url(); /*Este serve para colocar uma borda externa decorada*/
            border-image-slice: 27; /*serve para fatear ou cortar a imagem da borda em varios*/
            border-image-repeat: repeat; /* serve para repetir a imagem da borda*/
        }


    </style>
</head>
<body>
    <h1>Bordas Personalisadas</h1>
</body>
</html>
