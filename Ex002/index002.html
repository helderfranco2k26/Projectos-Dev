<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Dinâmicas</title>
</head>
<body>
    <p>para imagem dinamica nós usamos a tag "picture"</p>

    <picture>
        <source media="(max-width: 550px )" srcset="imagens/P.png" type="image/png">
        <source media="(max-width: 1250px)" srcset="imagens/M.png" type="image/png">
        <img src="imagens/G.png" alt="Imagem flexivel">
    </picture>
    <h2>Reproduzir Audio</h2>
    <audio src="Audio/Chin.mp3" controls autoplay></audio>
    <!--outra maneira de reproduzir audio em HTML-->
    <h4>Outras maneiras de reproduzir audio</h4>
    <audio preload="metadata" autoplay controls loop>
        <source src="Audio/Chin.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
