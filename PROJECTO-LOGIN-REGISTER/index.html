<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="styles.css">
   <link rel="stylesheet" href=" https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
         <!--Login Form-->
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forget password</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>ou faca login de outra maneira</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>

                </div>
            </form>
        </div>
         
    <!--Register Form-->
    <div class="form-box register">
        <form action="#">
            <h1>Registra-se</h1>
            <div class="input-box">
                <input type="text" placeholder="Fist Name" required>
                <i class="fa-solid fa-address-card"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Last name" required>
                <i class="fa-solid fa-address-card"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-box">
                <input type="text" placeholder="password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn">Registra-se</button>
                <p>Ou Registra-se com redes sociais</p>
            <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>

            </div>
            
        </form>
    </div>
    <!--Toggle Box-->
    <div class="toggle-box"></div>
    <!--Toggle box left-->
    <div class="toggle-panel toggle-left">
        <h1>Ola, Seja Bem-vindo</h1>
        <p>Nao tem uma conta?</p>
        <button class="btn cadastro-btn">Cadastre-se</button>
    </div>
    <!--Toggle box right-->
    <div class="toggle-panel toggle-rigth">
        <h1>Bem-vindo de volta</h1>
        <p>Ja possui uma conta?</p>
        <button class="btn login-btn">Login</button>
    </div>

 </div>
</body>
<script src="script.js"></script>
</html>
